<style>
.ach-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}
.ach-card{
  background:rgba(255,255,255,0.12);
  padding:15px;
  border-radius:15px;
  transition:.2s;
  text-align:center;
}
.ach-card.locked{
  opacity:0.4;
  filter:grayscale(1);
}
.ach-card.unlocked{
  border:2px solid #00ff88;
  box-shadow:0 0 15px #00ff88;
}
.ach-title{font-size:18px;font-weight:bold;}
.ach-desc{font-size:14px;opacity:0.8;margin-top:6px;}
.ach-xp{color:gold;margin-top:6px;}
</style>
